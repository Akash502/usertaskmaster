


<div class="search-bar-wrapper">
  <div class="search-container">
    <mat-form-field appearance="outline" class="glassy-search">
      <mat-icon matPrefix>search</mat-icon>
      <mat-label>Search tasks</mat-label>
      <input
        matInput
        [(ngModel)]="searchText"
        placeholder="Enter keyword"
      />
      <button
        *ngIf="searchText"
        matSuffix
        mat-icon-button
        aria-label="Clear"
        (click)="searchText = ''"
      >
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <button mat-flat-button color="primary" class="add-task-button" (click)="onAddTask()">
    <mat-icon>add</mat-icon> Add Task
  </button>
</div>

<div class="card-container">
  <mat-card class="task-card" [ngStyle]="{ 'background-color': task.color }" *ngFor="let task of filteredTasks()">
    <mat-card-header>
      <mat-card-title>{{ task.title }}</mat-card-title>
      <mat-card-subtitle>
        <span 
  class="priority-label"
  [ngClass]="{
    'high-priority': task.priority === 'High',
    'medium-priority': task.priority === 'Medium',
    'default-priority': task.priority !== 'High' && task.priority !== 'Medium'
  }"
>
  Priority: {{ task.priority }}
</span>

        <br />
        <span class="due-date">
          Due: {{ task.dueDate | date: 'mediumDate' }}
        </span>
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>{{ task.description }}</p>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-icon-button color="primary" aria-label="Edit" (click)="onEditTask(task)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" aria-label="Delete" (click)="deleteTask(task.id)" >
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
